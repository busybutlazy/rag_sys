name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  be:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet format be-server/BeServer.sln --verify-no-changes
      - run: dotnet test be-server/BeServer.Tests/BeServer.Tests.csproj

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: pip install .
      - run: ruff check app tests ../ai-server/app
      - run: python -m unittest discover -s tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run smoke
      - run: npm run build

  compose-smoke:
    if: ${{ secrets.JWT_SECRET != '' && secrets.RAG_INTERNAL_SECRET != '' && secrets.AI_INTERNAL_SECRET != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build be-server ai-server rag-server frontend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RAG_INTERNAL_SECRET: ${{ secrets.RAG_INTERNAL_SECRET }}
          AI_INTERNAL_SECRET: ${{ secrets.AI_INTERNAL_SECRET }}
