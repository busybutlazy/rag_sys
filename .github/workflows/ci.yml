name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  be:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet format be-server/BeServer.sln --verify-no-changes
      - run: dotnet test be-server/BeServer.Tests/BeServer.Tests.csproj

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: pip install .
      - run: ruff check app tests ../ai-server/app
      - run: python -m unittest discover -s tests
        env:
          RAG_INTERNAL_SECRET: ci_test_secret_at_least_32_characters_long
          OPENAI_API_KEY: dummy

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run smoke
      - run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required secrets are configured
        id: secrets-check
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RAG_INTERNAL_SECRET: ${{ secrets.RAG_INTERNAL_SECRET }}
          AI_INTERNAL_SECRET: ${{ secrets.AI_INTERNAL_SECRET }}
        run: |
          if [ -n "$JWT_SECRET" ] && [ -n "$RAG_INTERNAL_SECRET" ] && [ -n "$AI_INTERNAL_SECRET" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.secrets-check.outputs.ready == 'true'
        run: docker compose build be-server ai-server rag-server frontend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RAG_INTERNAL_SECRET: ${{ secrets.RAG_INTERNAL_SECRET }}
          AI_INTERNAL_SECRET: ${{ secrets.AI_INTERNAL_SECRET }}
